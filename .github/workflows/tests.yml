name: tests

# Comprehensive test suite: runs on every push and pull request across the full
# OS / architecture / Python matrix, against the cropped 10-second real-data
# fixture bundle (a GitHub Release asset). See tests/README.md.

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  # Direct-download URL of meegqc_test_data.tar.gz. Works with ANY public host:
  #   - a GitHub Release asset:
  #       https://github.com/<owner>/MEEGqc/releases/download/test-data-v1/meegqc_test_data.tar.gz
  #   - a Nextcloud / university-cloud public share link, with "/download" appended:
  #       https://cloud.uol.de/s/<share-token>/download
  # Prefer a repo variable so it is not hard-coded: set FIXTURES_URL under
  # Settings -> Secrets and variables -> Actions -> Variables, and the line below
  # falls back to it. Bump FIXTURES_VERSION whenever you replace the data so the
  # cache re-fetches.
  FIXTURES_URL: ${{ vars.FIXTURES_URL || 'https://cloud.uol.de/s/5JnCs6FxSnejjD6/download' }}
  FIXTURES_VERSION: v1

jobs:
  test:
    name: ${{ matrix.runner.label }} py${{ matrix.python }}
    runs-on: ${{ matrix.runner.os }}
    continue-on-error: ${{ matrix.runner.experimental || false }}
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        runner:
          - { os: ubuntu-latest,    label: linux-x64 }
          - { os: ubuntu-24.04-arm, label: linux-arm }
          - { os: macos-13,         label: macos-x64 }
          - { os: macos-14,         label: macos-arm }
          - { os: windows-latest,   label: windows-x64 }

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          allow-prereleases: true

      # Qt needs a few X libraries on Linux even with the offscreen platform.
      - name: Install Qt system libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libdbus-1-3

      - name: Install MEEGqc + pytest
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      # ---- Real-data fixtures: download once, cache by release tag ----------
      - name: Cache fixtures
        id: cache-fixtures
        uses: actions/cache@v4
        with:
          path: meegqc_test_data
          key: fixtures-${{ env.FIXTURES_VERSION }}

      - name: Download fixtures
        if: steps.cache-fixtures.outputs.cache-hit != 'true'
        run: |
          echo "Downloading fixtures ($FIXTURES_VERSION)"
          curl -fsSL -o fixtures.tar.gz "$FIXTURES_URL"
          tar -xzf fixtures.tar.gz
          rm -f fixtures.tar.gz

      - name: Show fixture summary
        run: |
          python - <<'PY'
          import json, pathlib
          m = json.load(open("meegqc_test_data/MANIFEST.json"))
          ok = [r for r in m["recordings"] if "error" not in r]
          print(f"{len(ok)} recordings across {m['n_datasets']} datasets")
          PY

      # ---- Run the suite --------------------------------------------------
      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
          MEEGQC_TEST_DATA: ${{ github.workspace }}/meegqc_test_data
        run: |
          python -m pytest tests/ -v --durations=25 -p no:cacheprovider
